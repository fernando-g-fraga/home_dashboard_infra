services:
  api:
    build:
      context: ../home_dashboard_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_KEY: ${API_KEY}
      REDIS_URL: ${REDIS_URL:-}
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  frontend:
    build:
      context: ../home_dashboard_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_BACKEND_URL: ${API_BACKEND_URL:-http://api:8000}
    depends_on:
      - api
