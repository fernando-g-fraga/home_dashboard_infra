services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-home_dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-home_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../home_dashboard_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Host must be the Compose service name "db", not localhost/postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-home_dashboard}
      API_KEY: ${API_KEY}
      REDIS_URL: ${REDIS_URL:-}
      TZ: ${TZ:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  frontend:
    build:
      context: ../home_dashboard_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_BACKEND_URL: ${API_BACKEND_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
